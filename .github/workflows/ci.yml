name: CI

# Build and test on every push to main and on pull requests targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest   # WPF requires Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SteamAccountManager.slnx

      - name: Build
        run: dotnet build SteamAccountManager.slnx -c Release --no-restore

      - name: Test
        run: dotnet test SteamAccountManager.slnx -c Release --no-restore
